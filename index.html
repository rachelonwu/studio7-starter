<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Yet Another To-Do List</title>
	<link rel="icon">
	<link rel="stylesheet" href="style.css">
	<script type="module">
		import * as app from './index.js';
		globalThis.app = app;
	</script>
</head>
<body>
	<div id="app">
		<h1><span id="done_count">0</span> out <span id="total_count">1</span> tasks complete</h1>

		<ul id="tasks_list" aria-label="To-do list"></ul>

		<template id="task_template">
			<li draggable="true">
				<input type="checkbox" aria-label="Done?" class="done">
				<input type="text" aria-label="Task" class="title">
				<button class="delete" aria-label="Delete task">x</button>
			</li>
		</template>

		<button onclick="app.addItem()">Add item</button>
		<button id="clear_completed_button" onclick="app.clearCompleted()">Clear completed</button>
	</div>
</body>
</html>
